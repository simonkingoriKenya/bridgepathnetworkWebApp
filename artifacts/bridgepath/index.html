<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Critical image preload — starts fetching the hero before JS runs (improves LCP) -->
    <link rel="preload" href="/photos/hero-team-bright.webp" as="image" type="image/webp" fetchpriority="high" />

    <!-- Primary meta -->
    <title>Bridgepath Africa — Africa's Premier HR &amp; Talent Platform</title>
    <meta name="description" content="Bridgepath Africa connects African talent with global employers. Premium HR services, recruitment, and job opportunities across Ghana and Kenya." />
    <meta name="keywords" content="African jobs, HR Africa, recruitment Ghana, recruitment Kenya, African talent, global employers, HR consulting Africa" />
    <meta name="author" content="Bridgepath Africa" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph — used by WhatsApp, Facebook, LinkedIn, Slack, iMessage -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bridgepath Africa" />
    <meta property="og:title" content="Bridgepath Africa — Africa's Premier HR &amp; Talent Platform" />
    <meta property="og:description" content="Connecting African talent with global employers. Premium recruitment, HR consulting, and career opportunities across Ghana and Kenya." />
    <meta property="og:image" content="https://bridgepathafricahr.com/opengraph.jpg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta property="og:image:alt" content="Bridgepath Africa — Hire Africa. Build the Future." />
    <meta property="og:url" content="https://bridgepathafricahr.com" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bridgepath Africa — Africa's Premier HR &amp; Talent Platform" />
    <meta name="twitter:description" content="Connecting African talent with global employers. Premium recruitment, HR consulting, and career opportunities across Ghana and Kenya." />
    <meta name="twitter:image" content="https://bridgepathafricahr.com/opengraph.jpg" />
    <meta name="twitter:image:alt" content="Bridgepath Africa — Hire Africa. Build the Future." />

    <!-- Structured Data — Organization + WebSite schema (triggers Google Sitelinks) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://bridgepathafricahr.com/#organization",
          "name": "Bridgepath Africa",
          "url": "https://bridgepathafricahr.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://bridgepathafricahr.com/logo-new.png",
            "width": 200,
            "height": 200
          },
          "description": "Africa's premier HR and talent platform connecting professionals across Ghana and Kenya with global employers.",
          "foundingDate": "2024",
          "areaServed": [
            { "@type": "Country", "name": "Ghana" },
            { "@type": "Country", "name": "Kenya" }
          ],
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "pkumanyc@gmail.com",
            "contactType": "customer service",
            "availableLanguage": "English"
          },
          "sameAs": [
            "https://www.linkedin.com/company/bridgepath-africa",
            "https://twitter.com/bridgepathafr",
            "https://facebook.com/bridgepathafr"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://bridgepathafricahr.com/#website",
          "name": "Bridgepath Africa",
          "url": "https://bridgepathafricahr.com",
          "publisher": { "@id": "https://bridgepathafricahr.com/#organization" },
          "description": "Africa's premier HR and talent platform — job listings, EOR, payroll, recruitment, and HR consulting for Ghana and Kenya.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://bridgepathafricahr.com/jobs?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo-new.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo-new.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
