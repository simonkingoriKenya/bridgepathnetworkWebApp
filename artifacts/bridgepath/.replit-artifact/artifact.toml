kind = "web"
previewPath = "/"
title = "Bridgepath Network"
version = "1.0.0"
id = "artifacts/bridgepath"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20522

[services.development]
run = "pnpm --filter @workspace/bridgepath run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bridgepath", "run", "build" ]
publicDir = "artifacts/bridgepath/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20522"
BASE_PATH = "/"
